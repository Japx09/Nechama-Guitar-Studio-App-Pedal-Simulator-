                    const modOsc = audioCtx.createOscillator(); modOsc.frequency.value = 0.5; // Very slow
                    const modDepth = audioCtx.createGain(); modDepth.gain.value = 0.0005; // Extremely shallow depth (0.5ms)
                    modOsc.connect(modDepth); modDepth.connect(modDelay.delayTime); modOsc.start();

                    input.connect(mixDry); // Dry path
                    mixDry.connect(output);
                    
                    input.connect(effectNode); // Wet path
                    effectNode.connect(shimmerFilter);
                    shimmerFilter.connect(modDelay);
                    modDelay.connect(mixWet);
                    
                    mixWet.connect(output);
                    
                    subNodes = [effectNode, mixDry, mixWet, modDelay, modOsc, modDepth, shimmerFilter, shimmerGain];
                } else {
                    const mix = audioCtx.createGain();
                    mix.gain.value = getVal('Mix') / 100;
                    input.connect(output); // Dry
                    input.connect(effectNode);
                    effectNode.connect(mix);
                    mix.connect(output); // Wet
                    subNodes = [effectNode, mix];
                }
                
            } else if (t.includes('amp')) {
                effectNode = audioCtx.createWaveShaper();
                let driveMult = t.includes('lead') ? 4 : (t.includes('jm') ? 1.5 : 1.0);
                effectNode.curve = makeDistortionCurve(getVal('Gain', getVal('Volume', 30)) * driveMult);
                effectNode.oversample = '2x';
                
                const bass = audioCtx.createBiquadFilter(); bass.type = 'lowshelf'; bass.frequency.value = 150; bass.gain.value = (getVal('Bass') - 50) / 2;
                const mid = audioCtx.createBiquadFilter(); mid.type = 'peaking'; mid.frequency.value = 800; mid.Q.value = 1.0; mid.gain.value = (getVal('Mid', 50) - 50) / 2;
                const treble = audioCtx.createBiquadFilter(); treble.type = 'highshelf'; treble.frequency.value = 3500; treble.gain.value = (getVal('Treble', getVal('Treb')) - 50) / 2;
                
                // Built-in Speaker Emulation (removes the fizzy nest of bees sound)
                const cabFilter1 = audioCtx.createBiquadFilter(); cabFilter1.type = 'lowpass'; cabFilter1.frequency.value = 5000; cabFilter1.Q.value = 0.7;
                const cabFilter2 = audioCtx.createBiquadFilter(); cabFilter2.type = 'lowpass'; cabFilter2.frequency.value = 6000; cabFilter2.Q.value = 0.7;
                
                const master = audioCtx.createGain();
                master.gain.value = getVal('Master', 50) / 50;

                input.connect(effectNode);
                effectNode.connect(bass); bass.connect(mid); mid.connect(treble);
                treble.connect(cabFilter1); cabFilter1.connect(cabFilter2); cabFilter2.connect(master);
                
                if (t.includes('fender')) {
                    // Add built-in spring reverb for Fender
                    const springRev = audioCtx.createConvolver();
                    springRev.buffer = generateImpulseResponse(1.5, 4); // Spring-like
                    
                    const revMix = audioCtx.createGain();
                    revMix.gain.value = getVal('Reverb', 0) / 100 * 0.8;
                    
                    master.connect(output); // Dry
                    master.connect(springRev);
                    springRev.connect(revMix);
                    revMix.connect(output); // Wet
                    
                    subNodes = [effectNode, bass, mid, treble, cabFilter1, cabFilter2, master, springRev, revMix];
                } else {
                    master.connect(output);
                    subNodes = [effectNode, bass, mid, treble, cabFilter1, cabFilter2, master];
                }
            } else {
                input.connect(output);
            }

            return { input, output, effectNode, subNodes };
        }

        function rebuildAudioGraph() {
            if (!audioCtx || !audioInput) return;

            audioInput.disconnect();
            for (let id in dspNodes) {
                dspNodes[id].input.disconnect();
                dspNodes[id].output.disconnect();
                if (dspNodes[id].subNodes) dspNodes[id].subNodes.forEach(n => n.disconnect());
            }
            dspNodes = {};

            for (let id in nodes) {
                if (nodes[id].type === 'io_in' || nodes[id].type === 'io_out') continue;
                dspNodes[id] = createDSPNode(nodes[id]);
            }

            wires.forEach(wire => {
                const fromId = wire.from;
                const toId = wire.to;

                let source = null;
                if (fromId === 'global_in') source = audioInput;
                else if (dspNodes[fromId]) source = (nodes[fromId].active ? dspNodes[fromId].output : dspNodes[fromId].input);

                let destination = null;
                if (toId === 'global_out') destination = audioOutput;
                else if (dspNodes[toId]) destination = dspNodes[toId].input;

                if (source && destination) {
                    try { source.connect(destination); } catch(e) { console.warn("Graph cycle", e); }
                }
            });
        }

        function updateDSPParam(pedalId) {
            if (!audioCtx || !dspNodes[pedalId]) return;
            const pedalData = nodes[pedalId];
            const dsp = dspNodes[pedalId];
            const getVal = (label, def=50) => { const k = pedalData.knobs.find(k => k.label.includes(label) || k.label===label); return k ? k.val : def; };
            
            if (pedalData.id.includes('ts') || pedalData.id.includes('ds1') || pedalData.id.includes('fuzz') || pedalData.id.includes('klon')) {
                if(dsp.subNodes[0]) dsp.subNodes[0].curve = makeDistortionCurve(getVal('Gain', getVal('Dist', getVal('Drive', 50))) * 10);
                if(dsp.subNodes[1]) dsp.subNodes[1].frequency.setTargetAtTime(500 + (getVal('Tone', getVal('Treble')) * 50), audioCtx.currentTime, 0.05);
                if(dsp.subNodes[2]) dsp.subNodes[2].gain.setTargetAtTime(getVal('Level', getVal('Volume', getVal('Output'))) / 50, audioCtx.currentTime, 0.05);
            } else if (pedalData.id.includes('delay') || pedalData.id.includes('aqua') || pedalData.id.includes('dd')) {
                if(dsp.subNodes[0]) dsp.subNodes[0].delayTime.setTargetAtTime(getVal('Delay', getVal('Time')) / 100 * 1.5, audioCtx.currentTime, 0.05);
                if(dsp.subNodes[1]) dsp.subNodes[1].gain.setTargetAtTime(getVal('F.Back', 30) / 100 * 0.9, audioCtx.currentTime, 0.05);
                if(dsp.subNodes[2]) dsp.subNodes[2].gain.setTargetAtTime(getVal('Mix', getVal('Blend', 50)) / 100, audioCtx.currentTime, 0.05);
            } else if (pedalData.id.includes('rv_') || pedalData.id.includes('cab')) {
                if(dsp.subNodes[1]) dsp.subNodes[1].gain.setTargetAtTime(pedalData.id.includes('cab') ? 1.0 : (getVal('Mix') / 100), audioCtx.currentTime, 0.05);
            } else if (pedalData.id.includes('amp')) {
                if(dsp.subNodes[0]) dsp.subNodes[0].curve = makeDistortionCurve(getVal('Gain') * 5);
                if(dsp.subNodes[1]) dsp.subNodes[1].gain.setTargetAtTime((getVal('Bass') - 50) / 2, audioCtx.currentTime, 0.05);
                if(dsp.subNodes[2]) dsp.subNodes[2].gain.setTargetAtTime((getVal('Mid') - 50) / 2, audioCtx.currentTime, 0.05);
                if(dsp.subNodes[3]) dsp.subNodes[3].gain.setTargetAtTime((getVal('Treble', getVal('Treb')) - 50) / 2, audioCtx.currentTime, 0.05);
                if(dsp.subNodes[4]) dsp.subNodes[4].gain.setTargetAtTime(getVal('Master', 50) / 50, audioCtx.currentTime, 0.05);
            }
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            initStorage();
            updateFileDropdown();
            loadCurrentPreset(); // Calls renderCanvas() and drawWires() internally
            renderLibrary();
            updateTransform();
        });
    </script>
